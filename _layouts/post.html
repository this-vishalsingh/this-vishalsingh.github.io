---
layout: default
---
<script>
  window.MathJax = {
    tex: { inlineMath: [['$','$'], ['\\(','\\)']], displayMath: [['$$','$$'], ['\\[', '\\]']] },
    options: { skipHtmlTags: ['script','noscript','style','textarea'] }
  };
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-chtml.min.js"></script>

<style>
/* Scoped styles for high-fidelity post */
.hf-post {
  --ink:     #1a1c20;
  --page:    #f7f4ef;
  --warm:    #ede8e0;
  --border:  #d4cfc6;
  --accent:  #c0392b;
  --accent2: #2c7bb5;
  --green:   #1a7a4a;
  --muted:   #7a756e;
  --bright:  #0f1115;
  --code-bg: #1e2128;
  --code-txt:#d4d8e0;
  
  background: var(--page);
  color: var(--ink);
  font-family: 'Lora', serif;
  font-size: 18px;
  line-height: 1.8;
  margin: -60px -80px; /* Counter-act main_content padding */
  border-radius: 4px;
  overflow: hidden;
}

/* Override site container for this specific post */
#main_content { 
  max-width: 800px !important; 
  padding: 60px 80px !important;
  background: white !important; /* Base background */
}

@media(max-width: 768px) {
  #main_content { padding: 30px 25px !important; }
  .hf-post { margin: -30px -25px; }
}

.hf-post .hero {
  background: var(--page);
  color: var(--ink);
  padding: 72px 40px 64px;
  position: relative;
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.hf-post .hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 39px,
    rgba(0,0,0,0.02) 39px, rgba(0,0,0,0.02) 40px
  );
  pointer-events: none;
}
.hf-post .hero-inner { max-width: 760px; margin: 0 auto; position: relative; }

.hf-post .hero-tags {
  display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px;
}
.hf-post .htag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 3px;
}
.hf-post .htag-red    { background: rgba(192,57,43,0.1);  color: var(--accent); border: 1px solid rgba(192,57,43,0.2); }
.hf-post .htag-blue   { background: rgba(44,123,181,0.1); color: var(--accent2); border: 1px solid rgba(44,123,181,0.2); }
.hf-post .htag-yellow { background: rgba(184,134,11,0.1); color: #8b6508; border: 1px solid rgba(184,134,11,0.2); }
.hf-post .htag-default { background: rgba(122,117,110,0.1); color: #555; border: 1px solid rgba(122,117,110,0.2); }

.hf-post .hero h1 {
  font-family: 'Lora', serif;
  font-size: clamp(28px, 4.5vw, 46px);
  line-height: 1.2;
  font-weight: 600;
  margin-bottom: 24px;
  color: var(--bright);
  border: none !important;
}
.hf-post .hero .lede {
  font-family: 'Outfit', sans-serif;
  font-size: 17px;
  color: var(--muted);
  line-height: 1.65;
  max-width: 640px;
  margin-bottom: 36px;
  font-weight: 300;
}
.hf-post .hero-meta {
  display: flex;
  align-items: center;
  gap: 20px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  color: var(--muted);
  flex-wrap: wrap;
}
.hf-post .hero-meta .ava {
  width: 34px; height: 34px; border-radius: 50%;
  background: linear-gradient(135deg, #e8ff6b, #6bffe8);
  display: flex; align-items: center; justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500; color: #000;
  flex-shrink: 0;
}
.hf-post .hero-meta a { color: #7ab8e8 !important; text-decoration: none !important; border-bottom: none !important; }
.hf-post .hero-meta a:hover { text-decoration: underline !important; }

/* LAYOUT */
.hf-post .container {
  max-width: 760px;
  margin: 0 auto;
  padding: 0 40px;
}

/* TOC */
.hf-post .toc-wrap {
  max-width: 760px; margin: 48px auto; padding: 0 40px;
}
.hf-post .toc {
  background: var(--warm);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 24px 28px;
}
.hf-post .toc-head {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 16px;
}
.hf-post .toc ol { padding-left: 20px; }
.hf-post .toc li { margin-bottom: 8px; font-family: 'Outfit', sans-serif; font-size: 15px; }
.hf-post .toc a { color: var(--accent2); text-decoration: none; border-bottom: none !important; }
.hf-post .toc a:hover { text-decoration: underline !important; }

/* TYPOGRAPHY */
.hf-post article { padding: 12px 0 100px; }

.hf-post h2 {
  font-family: 'Lora', serif !important;
  font-size: 28px !important;
  font-weight: 600 !important;
  color: var(--bright) !important;
  margin: 60px 0 20px !important;
  line-height: 1.3 !important;
  border-bottom: 2px solid var(--border) !important;
  padding-bottom: 12px !important;
  background: none !important;
}

.hf-post h3 {
  font-family: 'Outfit', sans-serif !important;
  font-size: 16px !important;
  font-weight: 600 !important;
  color: var(--bright) !important;
  margin: 32px 0 10px !important;
  text-transform: uppercase !important;
  letter-spacing: 0.06em !important;
  border: none !important;
}

.hf-post p { margin-bottom: 20px !important; }
.hf-post a { color: var(--accent2) !important; text-decoration: none !important; }
.hf-post a:hover { border-bottom: 1px solid var(--accent2) !important; }

.hf-post strong { font-weight: 600; color: var(--bright); }
.hf-post em { font-style: italic; color: var(--muted); }

/* PERSONAL NOTE */
.hf-post .personal {
  background: #fff;
  border-left: 4px solid var(--accent2);
  padding: 20px 24px;
  border-radius: 0 6px 6px 0;
  margin: 28px 0;
  font-style: italic;
  color: #444;
  font-size: 16.5px;
}
.hf-post .personal::before {
  content: '💬  ';
  font-style: normal;
}

/* CALLOUT */
.hf-post .callout {
  background: var(--warm);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 20px 24px;
  margin: 24px 0;
  font-family: 'Outfit', sans-serif;
  font-size: 15.5px;
  line-height: 1.65;
}
.hf-post .callout.danger {
  background: rgba(192,57,43,0.07);
  border-color: rgba(192,57,43,0.3);
}
.hf-post .callout.success {
  background: rgba(26,122,74,0.07);
  border-color: rgba(26,122,74,0.3);
}
.hf-post .callout .icon { font-size: 18px; margin-right: 6px; }

/* FINDING CARD */
.hf-post .finding-card {
  border-radius: 8px;
  padding: 24px 28px;
  margin: 32px 0;
  border: 1px solid;
}
.hf-post .finding-card.high {
  background: rgba(192,57,43,0.06);
  border-color: rgba(192,57,43,0.25);
}
.hf-post .finding-card.medium {
  background: rgba(230,126,34,0.06);
  border-color: rgba(230,126,34,0.25);
}
.hf-post .finding-card-top {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px; flex-wrap: wrap; gap: 8px;
}
.hf-post .badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 99px;
  letter-spacing: 0.05em;
}
.hf-post .badge-high   { background: rgba(192,57,43,0.2); color: #c0392b; }
.hf-post .badge-medium { background: rgba(230,126,34,0.2); color: #e67e22; }
.hf-post .badge-fixed  { background: rgba(26,122,74,0.2); color: #1a7a4a; }
.hf-post .finding-title {
  font-family: 'Outfit', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--bright);
  margin-bottom: 4px;
}
.hf-post .finding-file {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
}

/* CODE */
.hf-post pre {
  background: var(--code-bg);
  color: var(--code-txt);
  border-radius: 8px;
  padding: 22px 24px;
  overflow-x: auto;
  margin: 20px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  line-height: 1.7;
  border: 1px solid #2e333d;
}
.hf-post code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  background: rgba(0,0,0,0.08);
  padding: 2px 6px;
  border-radius: 4px;
  color: #333;
}
.hf-post pre code { background: none; padding: 0; color: inherit; font-size: inherit; }
.hf-post .kw  { color: #c792ea; }
.hf-post .fn  { color: #82aaff; }
.hf-post .cmt { color: #546e7a; font-style: italic; }
.hf-post .typ { color: #ffcb6b; }
.hf-post .num { color: #f78c6c; }
.hf-post .str { color: #c3e88d; }
.hf-post .del { display: block; background: rgba(192,57,43,0.15); color: #ff8a7a; }
.hf-post .add { display: block; background: rgba(26,122,74,0.15); color: #a3e4b5; }

/* MATH DISPLAY */
.hf-post .math-block {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px 28px;
  margin: 24px 0;
  text-align: center;
  overflow-x: auto;
  color: var(--ink);
}
.hf-post .math-label {
  font-family: 'Outfit', sans-serif;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 14px;
}

/* SVG DIAGRAMS */
.hf-post .diagram-wrap {
  margin: 32px 0;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px;
  overflow-x: auto;
}
.hf-post .diagram-caption {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  margin-top: 14px;
  font-style: italic;
}

/* SUMMARY TABLE */
.hf-post table {
  width: 100% !important;
  border-collapse: collapse !important;
  font-family: 'Outfit', sans-serif !important;
  font-size: 14.5px !important;
  margin: 28px 0 !important;
}
.hf-post th {
  text-align: left !important;
  padding: 10px 14px !important;
  font-size: 11px !important;
  text-transform: uppercase !important;
  letter-spacing: 0.08em !important;
  color: var(--muted) !important;
  border-bottom: 2px solid var(--border) !important;
  border: none !important;
  background: transparent !important;
}
.hf-post td {
  padding: 14px !important;
  border-bottom: 1px solid var(--border) !important;
  vertical-align: top !important;
  line-height: 1.5 !important;
  border-left: none !important;
  border-right: none !important;
  border-top: none !important;
}
.hf-post tr:last-child td { border-bottom: none !important; }
</style>

<div class="hf-post">
  <!-- HERO -->
  <div class="hero">
    <div class="hero-inner">
      {% if page.tags %}
      <div class="hero-tags">
        {% for tag in page.tags %}
          <span class="htag htag-default">{{ tag }}</span>
        {% endfor %}
      </div>
      {% endif %}

      <h1>{{ page.title }}</h1>

      {% if page.description %}
      <p class="lede">
        {{ page.description }}
      </p>
      {% endif %}

      <div class="hero-meta">
        {% if page.date %}
        <span>{{ page.date | date: "%B %d, %Y" }}</span>
        {% endif %}
      </div>
    </div>
  </div>

  <!-- ARTICLE -->
  <div class="container">
    <article>
      {{ content }}
    </article>
  </div>
</div>

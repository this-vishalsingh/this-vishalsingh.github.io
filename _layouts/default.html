<!DOCTYPE html>
<html lang="en-US">

<head>
  <meta charset='utf-8'>
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" type="text/css" media="screen" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&display=swap" rel="stylesheet">
  
  <!-- Site Icon / Symbol -->
  <link rel="icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/favicon.png' | relative_url }}">
  {% if page.url == "/" or page.url == "/index.html" %}
    <title>{{ site.title }} | {{ site.description }}</title>
    <meta name="description" content="{{ site.description }}">
  {% endif %}
  {% seo title=false %}
  <style>
  /* Base Slate overrides */
  #main_content { 
    background: #ffffff; 
    color: #444444; 
  }
  footer { display: none !important; }
  </style>
  {% include custom-styles.html %}
</head>

<body>
  <div id="header_wrap" class="outer">
    <header class="inner">
      <a href="{{ '/' | relative_url }}" style="text-decoration: none; color: inherit; display: block; border-bottom: none;">
        <div class="header-branding" style="display: flex; align-items: center; gap: 20px;">
          <img src="{{ '/assets/images/avatar.png' | relative_url }}" alt="Profile Avatar" class="header-avatar">
          <div class="header-text">
            <h1 id="project_title" style="font-family: inherit; font-size: 32px; font-weight: 800; letter-spacing: -1px; margin: 0; color: #ffffff;">{{ site.title }}</h1>
            <h2 id="project_tagline" style="font-size: 18px; font-weight: 300; margin-top: 5px; color: rgba(255, 255, 255, 0.7);">{{ site.description }}</h2>
          </div>
        </div>
      </a>
    </header>
  </div>

  <div id="main_content_wrap" class="outer">
    <section id="main_content" class="inner">
      {% include nav-tabs.html active=page.active %}
      {{ content }}
    </section>
  </div>
</body>

</html>

<style>

.maintained-by, .credits,
footer p:contains("maintained by"),
footer p:contains("Published with") {

}

}

#project_title {
  font-family: 'Inter', sans-serif !important;
  font-size: 36px !important;
  font-weight: 800 !important;

  color: white !important;
  text-shadow: none !important;
  margin-bottom: 8px !important;
}

#project_tagline {
  font-family: 'Inter', sans-serif !important;
  font-size: 18px !important;

}

    gap: 15px !important;

    width: 56px !important;

  }

  background: #f2f2f2 !important;
  border: none !important;
}

  color: #111111 !important;
  letter-spacing: -0.01em !important;
}

  font-size: 32px !important;

  margin-bottom: 30px !important;
  border: none !important;
}

#main_content h2 {
  font-size: 24px !important;
  font-weight: 600 !important;
  margin-top: 40px !important;
  margin-bottom: 20px !important;
  border-bottom: 1px solid #eee !important;
  padding-bottom: 8px !important;
  background: none !important;
}

#main_content h3 {
  font-size: 19px !important;
  font-weight: 600 !important;
  margin-top: 30px !important;
  margin-bottom: 12px !important;
  border: none !important;
}

#main_content p, #main_content li {
  font-size: 17px !important;
  margin-bottom: 1.25rem !important;
}

#main_content a {
  color: #1e6bb8 !important;
  border-bottom: 1px solid transparent !important;
  transition: border-bottom 0.2s ease !important;
}

#main_content a:hover {
  text-decoration: none !important;
  border-bottom: 1px solid #1e6bb8 !important;
}

/* Minimalist Horizontal Navigation */
.nav-tabs {
  display: flex !important;
  flex-direction: row !important;
  flex-wrap: wrap !important;
  justify-content: flex-start !important;
  margin-bottom: 3rem !important;
  padding: 0 0 20px 0 !important;
  border-bottom: 1px solid #eee !important;
  list-style: none !important;
  gap: 20px !important;
}

.nav-item-wrapper {
  text-decoration: none !important;
  transition: all 0.2s ease !important;
  position: relative !important;
}

.nav-link {
  font-family: 'Inter', sans-serif !important;
  font-size: 14px !important;
  font-weight: 600 !important;
  color: #666 !important;
  text-transform: uppercase !important;
  letter-spacing: 0.05em !important;
}

.nav-item-wrapper:hover .nav-link {
  color: #111 !important;
}

.nav-item-wrapper.active .nav-link {
  color: #1e6bb8 !important;
}

.nav-item-wrapper.active:after {
  content: "" !important;
  position: absolute !important;
  bottom: -21px !important;
  left: 0 !important;
  right: 0 !important;
  height: 2px !important;
  background: #1e6bb8 !important;
}

/* Hide navigation taglines completely */
.nav-tagline {
  display: none !important;
}

/* Table and Code styles */
table {
  width: 100% !important;
  border-collapse: collapse !important;
  margin-bottom: 30px !important;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif !important;
  font-size: 14px !important;
}

#main_content th, #main_content td {
  font-family: 'Inter', sans-serif !important;
}

#main_content a[target="_blank"]::after {
  content: " ↗";
  font-size: 12px;
  opacity: 0.5;
}

th {
  background: #fafafa !important;
  color: #111 !important;
  font-weight: 600 !important;
  padding: 12px !important;
  border: 1px solid #eee !important;
  text-align: left !important;
}

td {
  padding: 12px !important;
  border: 1px solid #eee !important;
}

/* Responsive adjustments */
@media (max-width: 768px) {
  #main_content {

    padding: 30px 20px !important;

    border-radius: 0 !important;

  .nav-tabs {
    gap: 15px !important;
    justify-content: flex-start !important;
    margin-bottom: 2rem !important;
    padding-bottom: 12px !important;
    overflow-x: auto !important;
    flex-wrap: nowrap !important;

    scrollbar-width: none !important; /* Hide scrollbar for clean look in Firefox */

  }

  }
}

@media (max-width: 480px) {
  .nav-link {

    padding: 25px 15px !important;
  }

</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const links = document.querySelectorAll('#main_content a');
  links.forEach(link => {
    if (link.hostname && link.hostname !== window.location.hostname) {
      link.setAttribute('target', '_blank');
      link.setAttribute('rel', 'noopener noreferrer');
    }
  });
});
</script>
